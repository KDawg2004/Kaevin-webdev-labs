<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap Exercise 02 - Form</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </head>
  <body
    class="bg-light d-flex justify-content-center align-items-center min-vh-100"
  >
    <form
      method="get"
      class="bg-white border rounded p-4 shadow-sm"
      style="max-width: 400px; width: 100%"
    >
      <h1 class="h4 text-center m-4">Roth IRA Calculator</h1>
      <div class="mb-3">
        <label for="balance" class="form-label">Balance ($)</label>
        <input type="text" id="balance" name="balance" class="form-control" />
      </div>

      <div class="mb-3">
        <label for="contributions" class="form-label"
          >Annual Contribution ($)</label
        >
        <input
          type="text"
          id="contributions"
          name="contributions"
          class="form-control"
        />
      </div>

      <div class="mb-3 row align-items-start">
        <fieldset class="row align-items-start mb-3">
          <legend class="col-sm-6 form-label mb-1">
            Maximize contributions?
          </legend>
          <div class="col-sm-6">
            <div class="form-check">
              <input
                class="form-check-input"
                type="radio"
                id="yes"
                value="yes"
                name="maximize"
              />
              <label class="form-check-label" for="yes">Yes</label>
            </div>
            <div class="form-check">
              <input
                class="form-check-input"
                type="radio"
                id="no"
                value="no"
                name="maximize"
              />
              <label class="form-check-label" for="no">No</label>
            </div>
          </div>
        </fieldset>
      </div>

      <div class="mb-3">
        <label for="rate" class="form-label">Expected return (%)</label>
        <select id="rate" name="rate" class="form-select">
          <option value="">Select rate</option>
          <option value="3">3%</option>
          <option value="4">4%</option>
          <option value="5">5%</option>
          <option value="6">6%</option>
          <option value="7">7%</option>
          <option value="8">8%</option>
        </select>
      </div>

      <div class="mb-3">
        <label for="curr_age" class="form-label">Current age</label>
        <select id="curr_age" name="curr_age" class="form-select">
          <option value="">Select age</option>
          <option value="18">18</option>
          <option value="25">25</option>
          <option value="30">30</option>
          <option value="35">35</option>
          <option value="40">40</option>
          <option value="45">45</option>
          <option value="50">50</option>
          <option value="55">55</option>
        </select>
      </div>

      <div class="mb-3">
        <label for="ret_age" class="form-label">Retirement age</label>
        <select id="ret_age" name="ret_age" class="form-select">
          <option value="">Select age</option>
          <option value="60">60</option>
          <option value="62">62</option>
          <option value="65">65</option>
          <option value="67">67</option>
          <option value="70">70</option>
        </select>
      </div>

      <div class="mb-3">
        <label for="tax_rate" class="form-label">Tax rate (%)</label>
        <select id="tax_rate" name="tax_rate" class="form-select">
          <option value="">Select rate</option>
          <option value="10">10%</option>
          <option value="12">12%</option>
          <option value="22">22%</option>
          <option value="24">24%</option>
          <option value="32">32%</option>
          <option value="35">35%</option>
          <option value="37">37%</option>
        </select>
      </div>

      <div class="d-flex gap-2 mb-3">
        <input
          type="submit"
          value="Calculate"
          class="btn btn-primary flex-grow-1"
        />
        <input
          type="reset"
          value="Reset"
          class="btn btn-outline-secondary flex-grow-1"
        />
      </div>

      <p class="text-muted small mb-0">
        This exercise is a simplified version of the Roth IRA Calculator
        <a href="https://www.calculator.net/roth-ira-calculator.html"
          >Calculator.net</a
        >
      </p>
    </form>
  </body>
</html>
